[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

[profile.default.fmt]
line_length = 120
tab_width = 4

[rpc_endpoints]
pharos_atlantic = "https://atlantic.dplabs-internal.com"

[etherscan]
pharos_atlantic = { key = "any", url = "https://api.socialscan.io/pharos-atlantic-testnet/v1/explorer/command_api/contract", chain = 688689 }
